name: Sync secret-detection ruleset

on:
  schedule:
    # Daily at 04:00 UTC.
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build ruleset
        run: python3 scripts/build-ruleset.py

      - name: Commit if changed
        run: |
          if git diff --quiet latest.json report.json; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json report.json
          git commit -m "chore: sync secret-detection ruleset"
          git push
