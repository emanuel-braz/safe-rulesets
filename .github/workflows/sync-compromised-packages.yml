name: Sync compromised packages

on:
  schedule:
    # Daily at 04:30 UTC.
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build compromised packages catalog
        run: python3 scripts/build-compromised-packages.py

      - name: Commit if changed
        run: |
          if git diff --quiet compromised-packages.json compromised-packages-report.json; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add compromised-packages.json compromised-packages-report.json
          git commit -m "chore: sync compromised packages catalog"
          git push
